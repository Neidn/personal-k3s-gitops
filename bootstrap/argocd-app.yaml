# =============================================================================
# bootstrap/argocd-app.yaml
#
# ArgoCD self-managed Application (bootstrap/install.sh 에서 1회 적용)
#
# Multi-Source 구성:
#   Source 1 — Helm chart (argo/argo-cd)
#   Source 2 — Git ref ($values 제공)
#   Source 3 — Git path: infra/argocd/config/ (IngressRoute 등)
#
# ApplicationSet 스캔 대상에서 제외(infra/argocd exclude)되므로
# 이 파일을 bootstrap 시 직접 apply
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: infra

  sources:
    # Source 1: ArgoCD Helm Chart
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: "9.4.10"   # renovate: registryUrl=https://argoproj.github.io/argo-helm chart=argo-cd
      helm:
        valueFiles:
          - $values/infra/argocd/chart/values.yaml

    # Source 2: $values 제공
    - repoURL: https://github.com/Neidn/personal-k3s-gitops
      targetRevision: main
      ref: values

    # Source 3: IngressRoute 등 ArgoCD 설정 리소스
    - repoURL: https://github.com/Neidn/personal-k3s-gitops
      targetRevision: main
      path: infra/argocd/config

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
