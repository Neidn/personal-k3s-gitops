# =============================================================================
# bootstrap/root-appset.yaml
#
# infra/ 하위 디렉토리를 스캔해서 Application 자동 생성
#
# 핵심 규칙:
#   각 infra/{앱}/ 디렉토리는 "배포할 리소스"를 직접 포함해야 함
#   (kustomization.yaml + 실제 manifest)
#   Application CRD 를 담은 app.yaml 을 kustomization 으로 감싸는 이중 구조 X
#
# argocd 는 Multi-Source 특수케이스 → bootstrap/argocd-app.yaml 에서 직접 관리
#   → infra/argocd 는 exclude
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-appset
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - git:
        repoURL: https://github.com/Neidn/personal-k3s-gitops
        revision: main
        directories:
          - path: infra/*
          # argocd: Multi-Source 특수케이스 → bootstrap/argocd-app.yaml 에서 직접 관리
          - path: infra/argocd
            exclude: true
          # _template: 스캔 제외
          - path: infra/_template
            exclude: true

  template:
    metadata:
      name: "{{.path.basename}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io

    spec:
      project: infra

      source:
        repoURL: https://github.com/Neidn/personal-k3s-gitops
        targetRevision: main
        path: "{{.path.path }}"

      destination:
        server: https://kubernetes.default.svc
        namespace: argocd

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=true

      ignoreDifferences:
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - .spec.template.spec.containers[].env[].valueFrom.resourceFieldRef.divisor

  syncPolicy:
    preserveResourcesOnDeletion: false
