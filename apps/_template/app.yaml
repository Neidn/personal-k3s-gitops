# =============================================================================
# apps/_template/app.yaml
#
# 새 워크로드 앱 추가 시 이 파일을 복사해서 사용
#
# 패턴 A — Helm chart + Git values (외부 Helm chart 앱)
# 패턴 B — Git path 단독 (커스텀 매니페스트 앱)
# =============================================================================

# ── 패턴 A: Helm Multi-Source ─────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: REPLACE_APP_NAME
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  # 워크로드 앱은 반드시 apps 프로젝트 사용 (클러스터 리소스 생성 불가)
  project: apps

  sources:
    # Source 1: Helm chart
    - repoURL: https://REPLACE_HELM_REPO_URL
      chart: REPLACE_CHART_NAME
      targetRevision: "REPLACE_VERSION"
      helm:
        valueFiles:
          - $values/apps/REPLACE_APP_NAME/chart/values.yaml

    # Source 2: $values 제공
    - repoURL: https://github.com/Neidn/personal-k3s-gitops
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: REPLACE_APP_NAME

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
