apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: REPLACE_APP_NAME

# =============================================================================
# 패턴 A — Helm chart가 있는 경우
# =============================================================================
helmCharts:
  - name: REPLACE_CHART_NAME
    repo: https://REPLACE_HELM_REPO_URL
    version: "REPLACE_VERSION"
    releaseName: REPLACE_APP_NAME
    namespace: REPLACE_APP_NAME
    valuesInline:
      replicaCount: 1

      service:
        type: ClusterIP
        port: 80

      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"

# =============================================================================
# 패턴 B — Helm chart가 없는 경우
# helmCharts 블록을 제거하고 resources에 직접 매니페스트 파일 나열
# =============================================================================
# resources:
#   - namespace.yaml
#   - deployment.yaml
#   - service.yaml
#   - secret.yaml
#   - ingressroute.yaml

# =============================================================================
# 공통 추가 리소스
# Secret이 필요 없으면 secret.yaml 줄 제거
# =============================================================================
resources:
  - secret.yaml
  - ingressroute.yaml
