# =============================================================================
# apps/REPLACE_APP_NAME/secret.yaml
#
# SealedSecret — 암호화된 Secret (Git에 안전하게 커밋 가능)
#
# 구조:
#   SealedSecret (Git에 저장)
#     → sealed-secrets-controller가 복호화
#       → Secret "REPLACE_APP_NAME-secret" 자동 생성
#         → Deployment에서 참조
#
# ─── 최초 생성 ────────────────────────────────────────────────────────────────
#   kubectl create secret generic REPLACE_APP_NAME-secret \
#     --from-literal=key1=값1 \
#     --from-literal=key2=값2 \
#     --dry-run=client -o yaml \
#   | kubeseal \
#     --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system \
#     --format yaml \
#     --namespace REPLACE_APP_NAME \
#   > apps/REPLACE_APP_NAME/secret.yaml
#
# ─── Secret 값 변경 시 ────────────────────────────────────────────────────────
#   위 명령어를 새 값으로 재실행 후 push:
#   git add apps/REPLACE_APP_NAME/secret.yaml
#   git commit -m "fix: rotate REPLACE_APP_NAME secret"
#   git push origin main
#
# ─── 주의사항 ─────────────────────────────────────────────────────────────────
#   SealedSecret은 현재 클러스터의 공개키로 암호화됨
#   → 클러스터 재구성 시 sealed-secrets-controller 키가 바뀌므로
#     마스터키를 반드시 백업해둘 것
#
#   [백업]
#   kubectl get secret -n kube-system \
#     -l sealedsecrets.bitnami.com/sealed-secrets-key \
#     -o yaml > sealed-secrets-master-key-backup.yaml
#   ★ 백업 파일은 절대 Git에 올리지 말 것
#
#   [복원]
#   kubectl apply -f sealed-secrets-master-key-backup.yaml
#   kubectl rollout restart deployment sealed-secrets-controller -n kube-system
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: REPLACE_APP_NAME-secret
  namespace: REPLACE_APP_NAME
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    # kubeseal 실행 후 생성된 암호화 값으로 교체됨
    # 키 이름은 실제 Secret 키와 동일하게 맞출 것
    key1: REPLACE_WITH_KUBESEAL_OUTPUT
    key2: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: REPLACE_APP_NAME-secret
      namespace: REPLACE_APP_NAME
    type: Opaque
