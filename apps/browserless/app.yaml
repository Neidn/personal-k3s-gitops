# =============================================================================
# apps/browserless/app.yaml
#
# 패턴 A — Helm Multi-Source
#   Source 1: icoretech/browserless Helm chart
#   Source 2: $values 참조 (chart/values.yaml 제공)
#   Source 3: config/ 디렉토리 (IngressRoute, Secret 등 추가 리소스)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: browserless
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  sources:
    # Source 1: Helm chart (icoretech/browserless)
    - repoURL: https://icoretech.github.io/helm
      chart: browserless
      targetRevision: "0.4.0"
      helm:
        valueFiles:
          - $values/apps/browserless/chart/values.yaml

    # Source 2: $values 참조용 Git repo
    - repoURL: https://github.com/Neidn/personal-k3s-gitops
      targetRevision: main
      ref: values

    # Source 3: Traefik IngressRoute 등 추가 리소스
    - repoURL: https://github.com/Neidn/personal-k3s-gitops
      targetRevision: main
      path: apps/browserless/config

  destination:
    server: https://kubernetes.default.svc
    namespace: browserless
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.replicas