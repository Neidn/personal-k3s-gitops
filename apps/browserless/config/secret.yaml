# ============================================================
# ★ 임시 평문 Secret — Git에 올리기 전에 아래 방법으로 처리
#
# 방법 1) .gitignore에 추가하고 클러스터에 직접 적용
#   kubectl apply -f config/secret.yaml -n browserless
#
# 방법 2) 나중에 Sealed Secrets 도입 시 kubeseal로 교체
#   brew install kubeseal  또는
#   https://github.com/bitnami-labs/sealed-secrets/releases
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: browserless-secret
  namespace: browserless
type: Opaque
stringData:
  TOKEN: "CHANGE_ME"
