# =============================================================================
# infra/apps-appset/app.yaml
#
# apps/* 디렉토리를 자동 스캔하는 ApplicationSet 을
# infra 앱으로 등록 (root-appset 이 이 파일을 픽업)
#
# sync-wave: 2
#   argocd(-1) → traefik(0) → ingressroute(1) → apps-appset(2)
#   인프라가 완전히 준비된 이후 워크로드 앱 ApplicationSet 등록
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-appset
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"

spec:
  project: infra

  source:
    repoURL: https://github.com/Neidn/personal-k3s-gitops
    targetRevision: main
    path: infra/apps-appset/config

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
