# =============================================================================
# infra/argocd/config/ingressroute.yaml
#
# sync-wave: 1  → Traefik(wave 0) 이 완전히 뜬 이후 CRD 가 준비된 상태에서 적용
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-server-ipallowlist
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ipAllowList:
    sourceRange:
      - "118.36.224.186/32"
      # 필요 시 추가 IP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.neidn.com`)
      middlewares:
        - name: argocd-server-ipallowlist
          namespace: argocd
      priority: 10
      services:
        - name: argocd-server
          port: 80
  tls:
    certResolver: letsencrypt
