# =============================================================================
# infra/argocd/config/ingressroute.yaml
#
# ArgoCD IngressRoute
# IP 제한은 shared-ipallowlist (kube-system) 참조
# sync-wave: 1 → Traefik(wave 0) 이후 CRD 준비된 상태에서 적용
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.neidn.com`)
      middlewares:
        - name: shared-ipallowlist
          namespace: kube-system    # 공유 Middleware 참조
      priority: 10
      services:
        - name: argocd-server
          port: 80
  tls:
    certResolver: letsencrypt
