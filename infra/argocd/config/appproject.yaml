# =============================================================================
# infra/argocd/config/appproject.yaml
#
# infra AppProject 정의
# orphanedResources.warn: true + 자동생성 리소스 ignore 설정
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Cluster infrastructure components (ArgoCD, Traefik, CNI, etc.)"
  sourceRepos:
    - https://github.com/Neidn/personal-k3s-gitops
    - https://argoproj.github.io/argo-helm
    - https://helm.traefik.io/traefik
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
    ignore:
      # Pod - Deployment/StatefulSet/DaemonSet 자동생성
      - group: ""
        kind: Pod
        name: "*"
      # ReplicaSet - Deployment 자동생성
      - group: "apps"
        kind: ReplicaSet
      # ControllerRevision - StatefulSet/DaemonSet 자동생성
      - group: "apps"
        kind: ControllerRevision
      # Endpoints - Service 자동생성 (deprecated)
      - group: ""
        kind: Endpoints
      # EndpointSlice - Service 자동생성
      - group: "discovery.k8s.io"
        kind: EndpointSlice
      # Helm release 메타데이터
      - group: ""
        kind: Secret
        name: "sh.helm.release.v1.*"
      # ArgoCD 초기 설치 Secret
      - group: ""
        kind: Secret
        name: argocd-initial-admin-secret
      # Helm이 자동생성하는 redis secret
      - group: ""
        kind: Secret
        name: argocd-redis