# =============================================================================
# infra/traefik/config/ingressroute.yaml
# Traefik 대시보드 IngressRoute
# wave: 0 으로 HelmChartConfig 와 함께 적용
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-ipallowlist
  namespace: kube-system
spec:
  ipAllowList:
    sourceRange:
      - "118.36.224.186/32"
      # 필요 시 추가 IP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.neidn.com`)
      kind: Rule
      middlewares:
        - name: dashboard-ipallowlist
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    certResolver: letsencrypt
