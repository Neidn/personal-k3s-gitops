# =============================================================================
# infra/traefik/config/ingressroute.yaml
#
# Traefik 대시보드 IngressRoute
# IP 제한은 shared-ipallowlist (kube-system) 참조
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.neidn.com`)
      kind: Rule
      middlewares:
        - name: shared-ipallowlist
          namespace: kube-system    # 공유 Middleware 참조
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    certResolver: letsencrypt
