# =============================================================================
# infra/traefik/app.yaml
#
# k3s 내장 Traefik 을 HelmChartConfig 방식으로 설정
# (k3s 자체가 Traefik helm chart 를 관리하므로 ArgoCD 는 설정만 적용)
#
# sync-wave: 0 → argocd 코어(-1) 이후, IngressRoute(1) 이전
#
# 추후 k3s 내장 Traefik 대신 ArgoCD 직접 Helm 배포로 전환 시:
#   이 파일을 Multi-Source Application 으로 교체
#   (argocd/app.yaml 의 패턴 참조)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  project: infra

  source:
    repoURL: https://github.com/Neidn/personal-k3s-gitops
    targetRevision: main
    path: infra/traefik/config

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
