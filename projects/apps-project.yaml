# =============================================================================
# AppProject: apps
#
# 대상: n8n, Carbone, Browserless 등 실제 워크로드 앱
# 권한: 클러스터 리소스 생성 불가 (네임스페이스 리소스만 허용)
#
# sourceRepos / destinations 를 * 로 허용
#   → 앱 추가 시마다 이 파일 수동 편집 불필요
#   → clusterResourceWhitelist: Namespace만 허용, 나머지 클러스터 리소스 차단
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Workload applications (n8n, Carbone, Browserless, etc.)"

  # 앱 추가 시 편집 불필요 — clusterResourceWhitelist 로 보안 유지
  sourceRepos:
    - "*"

  destinations:
    - namespace: "*"
      server: "https://kubernetes.default.svc"

  # Namespace만 허용 — 앱이 자기 namespace 생성 가능
  # CRD, ClusterRole 등 인프라 리소스는 여전히 차단
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  # 네임스페이스 리소스만 허용
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  orphanedResources:
    warn: true
